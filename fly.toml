# fly.toml app configuration file generated for noticocacola on 2026-06-25T14:27:56Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'noticocacola'
primary_region = 'gru'

[build]

[processes]
  app = 'python check_stock.py'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
