name: Monitor laminas Mundial 2026

on:
  schedule:
    - cron: "*/5 * * * *"   # respaldo por si falla el auto-relanzamiento
  workflow_dispatch:         # permite lanzarlo a mano desde la pestana Actions

jobs:
  revisar-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      actions: write         # necesario para que gh workflow run funcione
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Revisar stock
        env:
          LOOP_MINUTES: "5"
          CHECK_INTERVAL: "60"
          SALES_CHANNEL: "1"
          USE_NTFY: "true"
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          USE_EMAIL: ${{ secrets.USE_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python check_stock.py

      - name: Relanzar workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run monitor.yml --ref ${{ github.ref_name }}
